<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Order Confirmed | Lumid Store</title>
<meta name="robots" content="noindex"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400;1,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../lumid.css"/>
<style>
  .success-wrap {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--charcoal);
    padding: 2rem;
    text-align: center;
  }
  .success-box {
    background: var(--white);
    border-radius: var(--r-md);
    padding: 3rem 2.5rem;
    max-width: 480px;
    box-shadow: var(--shadow-lg);
  }
  .success-icon {
    width: 64px; height: 64px;
    border-radius: 50%;
    background: var(--sage-lt);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.8rem;
    margin: 0 auto 1.5rem;
    color: #2f4a31;
  }
  .success-box h1 {
    font-family: var(--serif);
    font-size: 1.6rem;
    font-weight: 400;
    color: var(--charcoal);
    margin-bottom: 0.8rem;
  }
  .success-box p { font-size: 0.9rem; color: var(--dim-grey); line-height: 1.7; margin-bottom: 1rem; }
  .success-ref {
    font-family: var(--sans);
    font-size: 0.78rem;
    color: var(--dim-grey);
    background: var(--off-white);
    padding: 0.6rem 1rem;
    border-radius: var(--r-sm);
    margin-bottom: 1.8rem;
    word-break: break-all;
  }
  .success-btn {
    display: inline-block;
    padding: 0.85rem 2rem;
    background: var(--charcoal);
    color: var(--white);
    border-radius: var(--r-sm);
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    text-decoration: none;
  }
  .success-btn:hover { background: var(--gold); }
</style>
</head>
<body>
<div class="success-wrap">
  <div class="success-box">
    <div class="success-icon">✓</div>
    <h1>Order Confirmed</h1>
    <p>Thank you! Your order has been received and your payment was successful. We'll reach out via WhatsApp shortly to confirm delivery timing.</p>
    <div class="success-ref" id="refDisplay">Reference: —</div>
    <a href="index.html" class="success-btn">Continue Shopping</a>
  </div>
</div>
<script>
  const params = new URLSearchParams(window.location.search);
  const ref = params.get('ref');
  if (ref) document.getElementById('refDisplay').textContent = 'Reference: ' + ref;
</script>
</body>
</html>
